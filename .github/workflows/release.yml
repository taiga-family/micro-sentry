name: ⚠️ Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiga-family/ci/actions/setup/variables@8daf3354cad97676fd0bb06cc12f2498441130c1 # v1.200.0
      - uses: taiga-family/ci/actions/setup/node@8daf3354cad97676fd0bb06cc12f2498441130c1 # v1.200.0
      - run: npm run release
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
