name: ⚠️ Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiga-family/ci/actions/setup/variables@6e89be341f2bb8247f26ac563e72344e6c9cf9ad # v1.220.0
      - uses: taiga-family/ci/actions/setup/node@6e89be341f2bb8247f26ac563e72344e6c9cf9ad # v1.220.0
      - run: npm run release
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
